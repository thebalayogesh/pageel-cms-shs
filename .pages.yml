media_folder: "media"
public_folder: "/media"

collections:
  - name: pages
    label: Pages
    type: collection
    path: docs
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "rich-text" }

  - name: products
    label: Products
    label_singular: Product
    folder: docs/products
    extension: md
    format: frontmatter
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "number", value_type: "float", min: 0 }
      - { label: "Main Description", name: "body", widget: "markdown" }
      
      - label: "Super Features"
        name: "super_features"
        widget: "list"
        collapsed: false
        hint: "Prominent highlights with descriptions."
        fields:
          - { label: "Feature Heading", name: "heading", widget: "string" }
          - { label: "Supporting Text", name: "text", widget: "text" }

      - label: "Standard Features"
        name: "features"
        widget: "list"
        summary: "{{fields.feature_item}}"
        field: { label: "Feature", name: "feature_item", widget: "string" }

      - label: "Specifications"
        name: "specifications"
        widget: "object"
        fields:
          - { label: "Material", name: "material", widget: "string", required: false }
          - { label: "Dimensions", name: "dimensions", widget: "string", required: false }
          - { label: "Weight", name: "weight", widget: "string", required: false }
          - { label: "Technical Notes", name: "notes", widget: "text", required: false }
          
      - label: "Product Images"
        name: "gallery"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }