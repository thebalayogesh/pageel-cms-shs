media: media
content:
  - name: products
    label: Products
    folder: docs/products
    extension: md
    create: true
    slug: '{{slug}}'
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "number", value_type: "float", min: 0 }
      - { label: "Description", name: "body", widget: "markdown" }
      
      - label: "Super Features"
        name: "super_features"
        widget: "list"
        summary: '{{fields.feature_title}}'
        field: 
          label: "Feature Highlight"
          name: "feature_title"
          widget: "string"
        hint: "Top-tier selling points shown prominently."

      - label: "Features"
        name: "features"
        widget: "list"
        field: { label: "Feature", name: "feature", widget: "string" }

      - label: "Specifications"
        name: "specifications"
        widget: "object"
        fields:
          - { label: "Material", name: "material", widget: "string" }
          - { label: "Dimensions", name: "dimensions", widget: "string" }
          - { label: "Weight", name: "weight", widget: "string" }
          - { label: "Warranty", name: "warranty", widget: "string" }