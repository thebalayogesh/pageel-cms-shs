media: media
content:
  - name: pages
    label: Pages
    type: collection
    path: docs
    fields:
      - name: title
        label: Title
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: products
    label: Products
    type: collection
    path: docs/products
    # Pages CMS uses 'filename' for the naming pattern
    filename: "{{title}}"
    fields:
      - name: title
        label: Product Name
        type: string

      - name: price
        label: Price
        type: number
        # Helps with decimal points for currency
        step: 0.01

      - name: description
        label: Description
        type: rich-text

      - name: super_features
        label: Super Features (Highlights)
        type: list
        # Object type allows for a title + description per highlight
        fields:
          - name: feature_title
            label: Feature Title
            type: string
          - name: feature_description
            label: Feature Description
            type: string

      - name: features
        label: General Features
        type: list
        # Simple list of strings
        field:
          type: string

      - name: specifications
        label: Specifications
        type: object
        fields:
          - name: material
            label: Material
            type: string
          - name: dimensions
            label: Dimensions
            type: string
          - name: weight
            label: Weight
            type: string
          - name: manufacturer
            label: Manufacturer
            type: string

      - name: product_image
        label: Product Image
        type: image